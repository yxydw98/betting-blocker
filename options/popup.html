<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Betting Blocker</title>
  <style>
    :root { color-scheme: light dark; }
    body { width: 280px; margin: 0; padding: 14px 16px;
      font: 13px/1.45 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #161b22; color: #e6e6e6; }
    h1 { font-size: 14px; margin: 0 0 10px; display: flex; align-items: center; gap: 7px; }
    label.row { display: flex; align-items: center; gap: 9px; padding: 6px 0; cursor: pointer; }
    label.row input { width: 15px; height: 15px; }
    .site { margin: 10px 0; padding: 10px; border: 1px solid #283041; border-radius: 9px; background: #0e1116; }
    .site b { word-break: break-all; }
    button#toggleSite { margin-top: 8px; width: 100%; font: inherit; cursor: pointer;
      padding: 7px; border-radius: 7px; border: 1px solid #2f3a4d; background: #21262d; color: #e6e6e6; }
    button#toggleSite.on { background: #1f6feb; border-color: #1f6feb; color: #fff; }
    .foot { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
    a { color: #58a6ff; cursor: pointer; text-decoration: none; font-size: 12px; }
    #status { color: #7ee787; font-size: 12px; min-height: 14px; }
  </style>
</head>
<body>
  <h1>🚫 <span data-i18n="popup_title">Betting Blocker</span></h1>

  <label class="row"><input type="checkbox" id="enabled" /> <span data-i18n="enabled">Extension enabled</span></label>
  <label class="row"><input type="checkbox" id="blockNavigation" /> <span data-i18n="block_nav">Block visiting betting sites</span></label>

  <div class="site" id="siteBox">
    <div><span data-i18n="this_site">This site:</span> <b id="siteHost">—</b></div>
    <button id="toggleSite" data-i18n="aggr_btn">Aggressive mode</button>
  </div>

  <div class="foot">
    <a id="openOptions" data-i18n="all_settings">All settings…</a>
    <span id="status"></span>
  </div>

  <script src="../i18n.js"></script>
  <script src="ui.js"></script>
</body>
</html>
